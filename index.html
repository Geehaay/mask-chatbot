<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마스크 발명 아이디어 도우미</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #F0F7F8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 40px;
  }
  .wrap { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 12px; }

  /* 헤더 */
  .header {
    background: #028090; border-radius: 14px;
    padding: 18px 22px; display: flex; align-items: center; gap: 14px;
  }
  .header-icon {
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .header p  { font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.6; }

  /* 규칙 */
  .rules {
    background: #FAEEDA; border: 1px solid #EF9F27;
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; color: #633806; line-height: 1.85;
  }
  .rules strong { font-weight: 700; }

  /* 단계 표시 */
  .step-outer {
    background: #fff;
    border: 1px solid #D8E8EB;
    border-radius: 14px 14px 0 0;
    padding: 14px 16px 0;
  }
  .step-row { display: flex; align-items: flex-start; }
  .step-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .step-circle {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    background: #E8F5F7; color: #90B8BE; transition: all .3s;
  }
  .step-circle.active { background: #028090; color: #fff; }
  .step-circle.done   { background: #02C39A; color: #fff; }
  .step-label {
    font-size: 10px; color: #90B8BE; text-align: center;
    line-height: 1.4; transition: color .3s; word-break: keep-all;
  }
  .step-label.active { color: #028090; font-weight: 700; }
  .step-label.done   { color: #02C39A; }
  .step-line { flex: 1; height: 2px; background: #E0F4F7; margin-top: 13px; flex-shrink: 0; transition: background .3s; }
  .step-line.done { background: #02C39A; }

  /* 채팅 */
  .chat-body {
    background: #fff; border: 1px solid #D8E8EB;
    border-top: none; border-radius: 0 0 14px 14px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 2px 12px rgba(2,128,144,0.07);
  }
  .messages {
    min-height: 340px; max-height: 460px;
    overflow-y: auto; padding: 18px 16px;
    display: flex; flex-direction: column; gap: 14px;
    background: #F7FBFC; border-top: 1px solid #E0F4F7;
  }
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .avatar.bot  { background: #E0F4F7; }
  .avatar.user { background: #EAF3DE; }
  .bubble {
    max-width: 82%; padding: 10px 14px;
    font-size: 14px; line-height: 1.8;
    border-radius: 14px; word-break: keep-all;
  }
  .bubble.bot  { background: #fff; border: 1px solid #D8E8EB; border-radius: 4px 14px 14px 14px; color: #1A2E35; }
  .bubble.user { background: #028090; border-radius: 14px 4px 14px 14px; color: #fff; }
  .bubble p { margin-bottom: 4px; }
  .bubble p:last-child { margin-bottom: 0; }
  .warn {
    margin-top: 8px; padding: 7px 10px;
    background: #FAEEDA; border-radius: 7px;
    font-size: 12px; color: #633806; line-height: 1.6;
  }
  .loading-dots { display: flex; gap: 5px; padding: 6px 2px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #90B8BE; animation: bou 1s infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bou { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* 입력 */
  .input-row {
    padding: 12px 14px; border-top: 1px solid #E0F4F7;
    display: flex; gap: 8px; align-items: flex-end; background: #fff;
  }
  textarea#uIn {
    flex: 1; min-height: 44px; max-height: 110px;
    padding: 10px 12px; font-size: 14px;
    border: 1px solid #C8DEE2; border-radius: 10px;
    background: #F7FBFC; color: #1A2E35;
    resize: none; font-family: inherit; line-height: 1.5;
    outline: none; transition: border-color .2s;
  }
  textarea#uIn:focus { border-color: #028090; background: #fff; }
  button#sBtn {
    padding: 10px 18px; font-size: 14px; font-weight: 700;
    border: none; border-radius: 10px;
    background: #028090; color: #fff;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background .2s;
  }
  button#sBtn:hover    { background: #015F6B; }
  button#sBtn:disabled { background: #90B8BE; cursor: not-allowed; }

  /* 리셋 */
  .reset-row { text-align: right; }
  .reset-btn {
    background: none; border: 1px solid #C8DEE2;
    border-radius: 8px; padding: 5px 12px;
    font-size: 12px; color: #5F6B6E; cursor: pointer;
    transition: background .2s;
  }
  .reset-btn:hover { background: #E0F4F7; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-icon">🤖</div>
    <div>
      <h1>마스크 발명 아이디어 도우미</h1>
      <p>궁금한 걸 자유롭게 물어보세요!<br>답은 안 알려주고, 스스로 생각할 수 있게 힌트만 드려요 😊</p>
    </div>
  </div>

  <div class="rules">
    <strong>✅ 챗봇 사용 규칙</strong><br>
    ① 아이디어는 <strong>내가 먼저 생각</strong>한 뒤 챗봇에게 물어보기<br>
    ② 챗봇 힌트를 <strong>활동지에 그대로 쓰지 않기</strong> — 참고만 하기<br>
    ③ <strong>P(좋은 점)</strong>은 반드시 혼자 작성 / M·I가 막힐 때만 챗봇 사용
  </div>

  <div>
    <div class="step-outer">
      <div class="step-row" id="stepRow">
        <div class="step-item">
          <div class="step-circle active" id="sc0">1</div>
          <div class="step-label active" id="sl0">불편한 점<br>입력</div>
        </div>
        <div class="step-line" id="ln0"></div>
        <div class="step-item">
          <div class="step-circle" id="sc1">2</div>
          <div class="step-label" id="sl1">아이디어 1<br>입력</div>
        </div>
        <div class="step-line" id="ln1"></div>
        <div class="step-item">
          <div class="step-circle" id="sc2">3</div>
          <div class="step-label" id="sl2">힌트 받기 →<br>아이디어 2</div>
        </div>
        <div class="step-line" id="ln2"></div>
        <div class="step-item">
          <div class="step-circle" id="sc3">4</div>
          <div class="step-label" id="sl3">PMI 분석<br>M·I 도움</div>
        </div>
        <div class="step-line" id="ln3"></div>
        <div class="step-item">
          <div class="step-circle" id="sc4">5</div>
          <div class="step-label" id="sl4">단점 보완<br>도움</div>
        </div>
      </div>
    </div>

    <div class="chat-body">
      <div class="messages" id="msgs"></div>
      <div class="input-row">
        <textarea id="uIn" placeholder="여기에 입력하세요..." rows="2"></textarea>
        <button id="sBtn">전송</button>
      </div>
    </div>
  </div>

  <div class="reset-row">
    <button class="reset-btn" id="resetBtn">🔄 처음부터 다시 시작</button>
  </div>

</div>

<script>
const API   = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

const SYSTEM = `너는 중학교 1학년 기술 수업에서 '마스크 불편한 점 해결하기' 발명 활동을 돕는 챗봇이야.

[말투 규칙 — 절대 지킬 것]
- 문장은 짧고 쉽게. 한 문장에 15단어 넘기지 않기.
- 어려운 말 금지. 초등학생도 알 수 있는 쉬운 말만 사용.
- 한 번에 5문장 절대 넘기지 않기.
- 따뜻하고 친근하게.

[절대 금지]
- 완성된 아이디어 문장 제시 금지.
  나쁜 예시: "귀 대신 목 뒤에 걸 수 있는 마스크를 만들면 어때요?"
  이런 완성된 해결책은 절대 말하지 않기.
- 힌트는 딱 2개만. 3개 이상 주지 않기.
- P(좋은 점)는 절대 먼저 말하지 않기.

[허용]
- "마스크의 어떤 부분을 바꾸면 좋을까?" 처럼 스스로 생각하게 유도하는 질문.
- 힌트 2개 + 마지막에 학생 생각 묻는 질문 1개로 마무리.

[활동 단계별 챗봇 역할]
1단계(불편한 점): 공감 1문장 + 해결 방향 힌트 질문 2개. 5문장 이내.
2단계(아이디어 1): 칭찬 1문장 + 아이디어 발전 힌트 질문 2개. 5문장 이내.
3단계(아이디어 2): 아이디어 2 칭찬 + 구체화 도움 질문 1~2개. 5문장 이내.
4단계(PMI M·I): M(아쉬운 점)이나 I(흥미로운 점) 힌트만. P는 절대 말하지 않기. 5문장 이내.
5단계(단점 보완): M에서 찾은 단점을 어떻게 해결할지 힌트 2개. 5문장 이내.

[중요]
학생 어휘 수준이 낮음. 절대 어렵게 말하지 않기.
모든 단계에서 완성된 답 주지 말기.`;

let step = 0;
let discomfort = "";
let idea1 = "";
let idea2 = "";

const msgsEl = document.getElementById("msgs");
const input  = document.getElementById("uIn");
const btn    = document.getElementById("sBtn");

const PLACEHOLDERS = [
  "마스크를 쓸 때 불편했던 점을 써보세요!",
  "아이디어 1을 내가 직접 생각해서 써보세요!",
  "챗봇 힌트를 보고 아이디어 2를 써보세요!",
  "PMI에서 M이나 I가 막히면 여기에 질문하세요!",
  "M(아쉬운 점)을 어떻게 해결할지 챗봇과 함께 생각해봐요!"
];

const PROMPTS = [
  (v) => `학생이 마스크 불편한 점을 말했어: "${v}"\n짧게 공감해줘. 이 불편함을 해결하려면 어떤 방향에서 생각할 수 있는지 힌트 질문 2개만 줘. 답은 주지 마. 마지막에 "아이디어가 떠오르면 써봐!" 로 끝내줘. 5문장 이내.`,
  (v) => `학생이 아이디어 1을 말했어: "${v}" (불편한 점: "${discomfort}")\n짧게 칭찬해줘. 이 아이디어를 더 발전시킬 힌트 질문 2개만 줘. 완성된 답은 주지 마. 마지막에 "힌트 참고해서 아이디어 2를 써봐!" 로 끝내줘. 5문장 이내.`,
  (v) => `학생이 아이디어 2를 말했어: "${v}" (아이디어 1: "${idea1}")\n아이디어 2가 발전한 점을 짧게 칭찬해줘. 이 아이디어를 실제로 만들면 어떤 점을 더 생각해야 할지 질문 1개만 해줘. "이제 PMI 표를 채워봐! M이나 I가 막히면 나한테 물어봐 😊" 로 끝내줘. 5문장 이내.`,
  (v) => `학생이 PMI 작성 중 도움을 요청했어: "${v}"\n아이디어 2: "${idea2}"\nP(좋은 점)는 절대 말하지 마. M(아쉬운 점)이나 I(흥미로운 점) 힌트만 2개 줘. 쉬운 말로. 완성된 문장 주지 말고 질문으로. 5문장 이내.`,
  (v) => `학생이 단점 보완을 고민 중이야: "${v}"\n아이디어 2: "${idea2}"\n이 단점을 해결할 수 있는 방향 힌트 질문 2개만 줘. 완성된 답은 주지 마. 쉬운 말로. 5문장 이내.`
];

function updateSteps(s) {
  for (let i = 0; i < 5; i++) {
    const c = document.getElementById("sc" + i);
    const l = document.getElementById("sl" + i);
    c.className = "step-circle" + (i < s ? " done" : i === s ? " active" : "");
    l.className = "step-label"  + (i < s ? " done" : i === s ? " active" : "");
  }
  for (let i = 0; i < 4; i++) {
    const ln = document.getElementById("ln" + i);
    ln.className = "step-line" + (i < s ? " done" : "");
  }
  input.placeholder = PLACEHOLDERS[Math.min(s, 4)];
}

function addMsg(role, html, warn) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const av = document.createElement("div");
  av.className = "avatar " + role;
  av.textContent = role === "bot" ? "🤖" : "🙂";
  const bub = document.createElement("div");
  bub.className = "bubble " + role;
  bub.innerHTML = html;
  if (warn) {
    const w = document.createElement("div");
    w.className = "warn";
    w.innerHTML = "⚠️ 힌트를 그대로 쓰지 말고, 참고해서 <strong>내 생각으로 바꿔서</strong> 써요!";
    bub.appendChild(w);
  }
  wrap.appendChild(av);
  wrap.appendChild(bub);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showLoading() {
  const d = document.createElement("div");
  d.className = "msg bot"; d.id = "ld";
  const av = document.createElement("div");
  av.className = "avatar bot"; av.textContent = "🤖";
  const bub = document.createElement("div");
  bub.className = "bubble bot";
  bub.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  d.appendChild(av); d.appendChild(bub);
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function hideLoading() { const l = document.getElementById("ld"); if (l) l.remove(); }

function toHtml(t) {
  return t.split("\n").filter(l => l.trim()).map(l => `<p>${l}</p>`).join("");
}

async function callAPI(prompt) {
  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: MODEL, max_tokens: 500,
      system: SYSTEM,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "응답을 가져오지 못했어요. 다시 해봐요!";
}

async function handleSend() {
  const val = input.value.trim();
  if (!val || btn.disabled) return;
  input.value = "";
  btn.disabled = true;

  addMsg("user", `<p>${val}</p>`, false);

  // 단계별 변수 저장
  if (step === 0) discomfort = val;
  else if (step === 1) idea1 = val;
  else if (step === 2) idea2 = val;

  const promptFn = PROMPTS[Math.min(step, 4)];
  const prompt = promptFn(val);

  showLoading();
  try {
    const reply = await callAPI(prompt);
    hideLoading();
    // 힌트 경고는 1~4단계까지만
    addMsg("bot", toHtml(reply), step >= 0 && step <= 3);
    if (step < 4) step++;
    updateSteps(step);
  } catch(e) {
    hideLoading();
    addMsg("bot", "<p>오류가 났어요. 잠깐 후에 다시 해봐요!</p>", false);
  }
  btn.disabled = false;
  input.focus();
}

document.getElementById("resetBtn").addEventListener("click", () => {
  step = 0; discomfort = ""; idea1 = ""; idea2 = "";
  msgsEl.innerHTML = "";
  updateSteps(0);
  welcome();
});

function welcome() {
  addMsg("bot",
    `<p>안녕! 나는 <strong>마스크 발명 아이디어 도우미</strong>야! 🎉</p>
     <p>답은 직접 안 알려줘.</p>
     <p>네가 스스로 생각할 수 있게 <strong>힌트</strong>만 줄게!</p>
     <p>먼저 마스크 쓸 때 <strong>불편했던 점</strong>을 하나 써봐! 👇</p>`,
    false
  );
}

btn.addEventListener("click", handleSend);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

updateSteps(0);
welcome();
</script>
</body>
</html>
